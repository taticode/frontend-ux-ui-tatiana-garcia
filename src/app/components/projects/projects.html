<section id="projects" class="w-full max-w-7xl mx-auto px-6 py-12">
    <h3 class="text-4xl w-full pt-8 pb-6 text-brand-text-black">{{'projectsTitle' | translate}}</h3>
    <main class="relative py-8 w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"> 

        @for (project of projectList; track project.title) {
            <article class="overflow-hidden bg-brand-text-white shadow-sm border border-brand-background-brown rounded-2xl p-6 flex flex-col h-full">
                <div class="relative w-full aspect-video overflow-hidden rounded-2xl  bg-[#FAF7ED]">
                        <img
                            class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 scale-105"
                            [src]="project.thumbnail"
                            [alt]="project.title"
                            loading="lazy"
                        />
                
                </div>
                
                <section class="bg-brand-text-white flex flex-col grow">
                    <h5 class="mt-4 mb-2 font-semibold tracking-tight text-lg">
                        {{ project.title }}
                    </h5>
                    
                    <p class="mb-6 text-sm grow">
                        {{ project.description }}
                    </p>
                    @if(project.tags){
                        <div class="flex flex-wrap gap-2 mb-6">
                            @for (tag of project.tags; track tag) {
                                <span class="badge-pill">{{ tag }}</span>
                            }
                        </div>
                    }
          

                        <div class="flex flex-wrap gap-3 mt-auto">
                            <a class="main-button flex-1 justify-center group" 
                            [href]="project.link ? project.link : 'javascript:void(0)'"
                            [target]="project.link ? '_blank' : '_self'"
                            [class.btn-green]="project.link"
                            [class.btn-disabled]="!project.link || !project.gitRepo"
                            rel="noopener noreferrer nofollow">
                                <svg class="w-5 h-5 mr-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1Zm0 0-4 4m5 0H4m1 0 4-4m1 4 4-4m-4 7v6l4-3-4-3Z"/>
                                </svg>
                                Demo
                            </a>

                            <a class="main-button flex-1 justify-center group" 
                            [href]="project.gitRepo ? project.gitRepo : 'javascript:void(0)'"
                            [target]="project.gitRepo ? '_blank' : '_self'"
                            [class.btn-green]="project.gitRepo"
                            [class.btn-disabled]="!project.gitRepo"
                            rel="noopener noreferrer nofollow">
                                <svg class="w-5 h-5 mr-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                                    <path fill-rule="evenodd" d="M12.006 2a9.847 9.847 0 0 0-6.484 2.44 10.32 10.32 0 0 0-3.393 6.17 10.48 10.48 0 0 0 1.317 6.955 10.045 10.045 0 0 0 5.4 4.418c.504.095.683-.223.683-.494 0-.245-.01-1.052-.014-1.908-2.78.62-3.366-1.21-3.366-1.21a2.711 2.711 0 0 0-1.11-1.5c-.907-.637.07-.621.07-.621.317.044.62.163.885.346.266.183.487.426.647.71.135.253.318.476.538.655a2.079 2.079 0 0 0 2.37.196c.045-.52.27-1.006.635-1.37-2.219-.259-4.554-1.138-4.554-5.07a4.022 4.022 0 0 1 1.031-2.75 3.77 3.77 0 0 1 .096-2.713s.839-.275 2.749 1.05a9.26 9.26 0 0 1 5.004 0c1.906-1.325 2.74-1.05 2.74-1.05.37.858.406 1.828.101 2.713a4.017 4.017 0 0 1 1.029 2.75c0 3.939-2.339 4.805-4.564 5.058a2.471 2.471 0 0 1 .679 1.897c0 1.372-.012 2.477-.012 2.814 0 .272.18.592.687.492a10.05 10.05 0 0 0 5.388-4.421 10.473 10.473 0 0 0 1.313-6.948 10.32 10.32 0 0 0-3.39-6.165A9.847 9.847 0 0 0 12.007 2Z" clip-rule="evenodd"/>
                                </svg>
                                Github
                            </a>
                        </div>
                
                </section>
            </article>
        } @empty {
            <p class="mb-6 text-base col-span-full">{{'projectsEmpty' |translate}}</p>
        }
    </main>
</section>
