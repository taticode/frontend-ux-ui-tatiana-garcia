

<section id="experience" class="w-full bg-brand-background-global">
  <div class="max-w-7xl mx-auto px-4 md:px-6">
    
    <h3 class="text-4xl w-full pt-8 pb-6 text-brand-text-black">
      {{ 'positionsTitle' | translate }}
    </h3>

    <div class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide">
      @for (filter of filters; track filter.id) {
        <button (click)="setFilter(filter.id)"
          class="mr-4 py-2 border-b-2 whitespace-nowrap transition-all hover:text-shadow-bold cursor-pointer"
          [class]="filterSelected() === filter.id 
            ? 'text-brand-text-green border-brand-text-green text-shadow-bold' 
            : 'border-transparent text-brand-text-black'">
          {{ filter.label | translate }}
        </button>
      }
    </div>

    <div id="accordion-experience" data-accordion="collapse" class="max-w-7xl mx-auto relative">
      
      @for (item of timelineList(); track $index; let first = $first; let last = $last) {
        <article class="grid grid-cols-[1fr_auto_2fr] w-full group overflow-visible"
                 [class.first-item]="first"
                 [class.last-item]="last">
          
          <header class="flex items-center justify-end pr-10 md:pr-4 py-10 md:py-8">
            <span class="text-xs md:text-sm capitalize tracking-widest text-brand-text-black md:text-right leading-tight w-full">
              {{ item.startDate }} — {{ item.endDate }}
            </span>
          </header>

          <div class="relative flex justify-center w-8">
            <div class="timeline-line"></div>
            <div class="timeline-dot"></div>
          </div>

          <section class="pl-10 md:pl-4 py-4">
            <div class="clickable-card main-animation" [class.green]="item.type === 'course'">
              
              <h2 [id]="'heading-' + $index" class="m-0">
                <button type="button" 
                  class="flex items-center justify-between w-full p-5 text-left transition-colors gap-3 hover:bg-brand-primary-green/10" 
                  [attr.data-accordion-target]="'#body-' + $index" 
                  aria-expanded="false">
                  
                  <span class="font-bold text-brand-text-black leading-tight">
                    {{ item.company }} 
                    <span aria-hidden="true" class="hidden md:inline font-light text-brand-text-brown/50 mx-2">|</span>
                    <span class="block md:inline text-sm font-medium text-brand-text-black">{{ item.rol }}</span>
                  </span>

                  <svg data-accordion-icon class="w-4 h-4 shrink-0 transition-transform duration-300 text-brand-text-black/40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="icons['chevronDown']"/>
                  </svg>
                </button>
              </h2>

              <div [id]="'body-' + $index" class="hidden">
                <div class="border-t border-brand-primary-brown/30 bg-brand-primary-beige/20">
                  <ul class="space-y-3">
                    @for (p of item.description; track $index) {
                      <li class="flex gap-3 text-sm md:text-base text-brand-text-black/80">
                        <span class="text-brand-text-green font-bold">•</span>
                        {{ p }}
                      </li>
                    }
                  </ul>
                </div>
              </div>

            </div>
          </section>

        </article>
      }
    </div>
  </div>
</section>
